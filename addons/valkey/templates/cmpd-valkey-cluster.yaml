{{- range .Values.valkeyVersions }}
---
apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ printf "%s-%s" .componentDef $.Chart.Version }}
  labels:
    {{- include "valkey.labels" $ | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" $ | nindent 4 }}
spec:
  provider: GetStream
  description: Valkey {{ .major }}.x cluster ComponentDefinition (sibling to redis-cluster, with stream-tuned defaults baked in).
  serviceKind: valkey-cluster
  serviceVersion: {{ .serviceVersion }}
  minReadySeconds: 10
  podUpgradePolicy: ReCreate
  tls:
    volumeName: tls
    mountPath: {{ $.Values.tlsMountPath }}
    caFile: ca.crt
    certFile: tls.crt
    keyFile: tls.key
  services:
    - name: valkey-advertised
      serviceName: valkey-advertised
      spec:
        type: NodePort
        ports:
        - name: valkey-advertised
          port: 6379
          targetPort: valkey-cluster
        - name: advertised-bus
          port: 16379
          targetPort: cluster-bus
      podService: true
      disableAutoProvision: true
    - name: valkey-lb-advertised
      serviceName: valkey-lb-advertised
      spec:
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        ports:
          - name: valkey-advertised
            port: 6379
            targetPort: valkey-cluster
          - name: advertised-bus
            port: 16379
            targetPort: cluster-bus
      podService: true
      disableAutoProvision: true
  # Roll one replica per shard at a time; the surviving replica serves while
  # the other recreates.
  updateStrategy: Serial
  podManagementPolicy: OrderedReady
  volumes:
    - name: data
      needSnapshot: true
  roles:
    - name: primary
      updatePriority: 2
      participatesInQuorum: false
    - name: secondary
      updatePriority: 1
      participatesInQuorum: false
  logConfigs:
    {{- range $name,$pattern := $.Values.logConfigs }}
    - name: {{ $name }}
      filePathPattern: {{ $pattern }}
    {{- end }}
  exporter:
    containerName: metrics
    scrapePath: /metrics
    scrapePort: http-metrics
  configs:
    - name: valkey-cluster-config
      template: {{ printf "valkey-cluster-config-template-%s" $.Chart.Version }}
      namespace: {{ $.Release.Namespace }}
      volumeName: valkey-cluster-config
      # NOTE: do NOT set `externalManaged: true`. In KubeBlocks 1.0.2 the
      # synthesizer (pkg/controller/component/synthesize_component.go) wipes
      # `template` to "" whenever externalManaged is true and the Cluster CR
      # does not supply a `componentSpecs[].configs[].configMap` override.
      # The downstream `transformer_component_template.precheck` then fails
      # with `config/script template has no template specified: valkey-cluster-config`.
      # We don't expose user-overridable configs, so leaving this off lets the
      # operator manage the chart-provided ConfigMap directly.
      #
      # NOTE: also dropped the `reconfigure` field (helper:
      # valkey.config.reconfigureAction) because the field was added to the
      # ComponentDefinition CRD in KubeBlocks 1.1.x and is not in 1.0.2.
      # ConfigMap changes won't hot-reload via operator exec — they take effect
      # on the next pod restart (helm upgrade with resource/version delta, or
      # `kubectl create -f charts/valkey/ops/restart.yaml`). Adequate for cache.
  scripts:
    - name: valkey-cluster-scripts
      template: {{ include "valkeyCluster.scriptsTemplate" $ }}
      namespace: {{ $.Release.Namespace }}
      volumeName: scripts
      defaultMode: 0555
  {{- include "kblib.syncer.policyRules" $ | nindent 2 }}
  systemAccounts:
    - name: default
      initAccount: true
      passwordGenerationPolicy:
        length: 16
        numDigits: 4
        letterCase: MixedCases
  hostNetwork:
    containerPorts:
      - container: valkey-cluster
        ports:
          - valkey-cluster
          - cluster-bus
  {{- if $.Values.enableMetrics }}
      - container: metrics
        ports:
          - http-metrics
          - server-metrics
  {{- end }}
  vars:
    - name: TLS_ENABLED
      valueFrom:
        tlsVarRef:
          enabled: Optional
          optional: true
    - name: TLS_MOUNT_PATH
      value: {{ $.Values.tlsMountPath }}
    - name: CLUSTER_NAME
      valueFrom:
        clusterVarRef:
          clusterName: Required
    - name: CLUSTER_NAMESPACE
      valueFrom:
        clusterVarRef:
          namespace: Required
    - name: COMPONENT_REPLICAS
      valueFrom:
        componentVarRef:
          optional: false
          replicas: Required
    - name: CLUSTER_DOMAIN
      value: {{ $.Values.clusterDomain }}
    ## the default username/password of valkey connection (uses Redis-protocol AUTH)
    - name: REDIS_DEFAULT_USER
      valueFrom:
        credentialVarRef:
          name: default
          username: Required
    - name: REDIS_DEFAULT_PASSWORD
      valueFrom:
        credentialVarRef:
          name: default
          password: Required
    - name: REDIS_REPL_USER
      value: "kbreplicator"
    - name: REDIS_REPL_PASSWORD
      valueFrom:
        credentialVarRef:
          name: default
          password: Required
    - name: CURRENT_SHARD_POD_NAME_LIST
      valueFrom:
        componentVarRef:
          optional: false
          podNames: Required
    - name: CURRENT_SHARD_POD_FQDN_LIST
      valueFrom:
        componentVarRef:
          optional: false
          podFQDNs: Required
    - name: CURRENT_SHARD_COMPONENT_NAME
      valueFrom:
        componentVarRef:
          optional: false
          componentName: Required
    - name: CURRENT_SHARD_COMPONENT_SHORT_NAME
      valueFrom:
        componentVarRef:
          optional: false
          shortName: Required
    - name: CURRENT_SHARD_ADVERTISED_PORT
      valueFrom:
        serviceVarRef:
          name: valkey-advertised
          optional: true
          port:
            name: valkey-advertised
            option: Required
    - name: CURRENT_SHARD_ADVERTISED_BUS_PORT
      valueFrom:
        serviceVarRef:
          name: valkey-advertised
          optional: true
          port:
            name: advertised-bus
            option: Required
    - name: CURRENT_SHARD_LB_ADVERTISED_HOST
      valueFrom:
        serviceVarRef:
          name: valkey-lb-advertised
          optional: true
          loadBalancer: Required
          host: Required
    - name: CURRENT_SHARD_LB_ADVERTISED_PORT
      valueFrom:
        serviceVarRef:
          name: valkey-lb-advertised
          optional: true
          port:
            name: valkey-advertised
            option: Required
    - name: CURRENT_SHARD_LB_ADVERTISED_BUS_PORT
      valueFrom:
        serviceVarRef:
          name: valkey-lb-advertised
          optional: true
          port:
            name: advertised-bus
            option: Required
    - name: ALL_SHARDS_COMPONENT_SHORT_NAMES
      valueFrom:
        componentVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          optional: false
          shortName: Required
          multipleClusterObjectOption:
            strategy: combined
    - name: ALL_SHARDS_POD_NAME_LIST
      valueFrom:
        componentVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          optional: false
          podNames: Required
          multipleClusterObjectOption:
            strategy: individual
    - name: ALL_SHARDS_POD_FQDN_LIST
      valueFrom:
        componentVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          optional: false
          podFQDNs: Required
          multipleClusterObjectOption:
            strategy: individual
    - name: ALL_SHARDS_ADVERTISED_PORT
      valueFrom:
        serviceVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          name: valkey-advertised
          optional: true
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: "."
                keyValueDelimiter: "@"
          port:
            name: valkey-advertised
            option: Required
    - name: ALL_SHARDS_LB_ADVERTISED_PORT
      valueFrom:
        serviceVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          name: valkey-lb-advertised
          optional: true
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: "."
                keyValueDelimiter: "@"
          port:
            name: valkey-advertised
            option: Required
    - name: ALL_SHARDS_LB_ADVERTISED_BUS_PORT
      valueFrom:
        serviceVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          name: valkey-lb-advertised
          optional: true
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: "."
                keyValueDelimiter: "@"
          port:
            name: advertised-bus
            option: Required
    - name: ALL_SHARDS_LB_ADVERTISED_HOST
      valueFrom:
        serviceVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          name: valkey-lb-advertised
          optional: true
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: ","
                keyValueDelimiter: "@"
          host: Required
          loadBalancer: Required
    - name: REDIS_CLUSTER_HOST_NETWORK_PORT
      valueFrom:
        hostNetworkVarRef:
          optional: true
          container:
            name: valkey-cluster
            port:
              name: valkey-cluster
              option: Required
    - name: SERVICE_PORT
      value: "6379"
      expression: {{ `{{if index . "REDIS_CLUSTER_HOST_NETWORK_PORT"}}{{.REDIS_CLUSTER_HOST_NETWORK_PORT}}{{else}}{{.SERVICE_PORT}}{{end}}` | toYaml }}
    - name: REDIS_METRICS_ADDR
      value: "redis://localhost:$(SERVICE_PORT)"
      expression: {{ `{{if eq (index . "TLS_ENABLED") "true"}}rediss://localhost: {{.SERVICE_PORT }}{{else}}redis://localhost:{{.SERVICE_PORT}}{{end}}` | toYaml }}
    - name: REDIS_CLI_TLS_CMD
      value: ""
      expression: {{ `{{if eq (index . "TLS_ENABLED") "true"}}--tls --insecure{{else }}{{end}}` | toYaml }}
    - name: REDIS_CLUSTER_HOST_NETWORK_BUS_PORT
      valueFrom:
        hostNetworkVarRef:
          optional: true
          container:
            name: valkey-cluster
            port:
              name: cluster-bus
              option: Required
    - name: CLUSTER_BUS_PORT
      value: "16379"
      expression: {{ `{{if index . "REDIS_CLUSTER_HOST_NETWORK_BUS_PORT"}}{{.REDIS_CLUSTER_HOST_NETWORK_BUS_PORT}}{{else}}{{.CLUSTER_BUS_PORT}}{{end}}` | toYaml }}
  {{- if $.Values.enableMetrics }}
    - name: REDIS_METRICS_HOST_NETWORK_PORT
      valueFrom:
        hostNetworkVarRef:
          optional: true
          container:
            name: metrics
            port:
              name: http-metrics
              option: Required
    - name: REDIS_METRICS_HTTP_PORT
      value: "9121"
      expression: {{ `{{if index . "REDIS_METRICS_HOST_NETWORK_PORT"}}{{.REDIS_METRICS_HOST_NETWORK_PORT}}{{else}}{{.REDIS_METRICS_HTTP_PORT}}{{end}}` | toYaml }}
    - name: REDIS_METRICS_HOST_NETWORK_SERVER_PORT
      valueFrom:
        hostNetworkVarRef:
          optional: true
          container:
            name: metrics
            port:
              name: server-metrics
              option: Required
    - name: REDIS_METRICS_SERVER_PORT
      value: "8888"
      expression: {{ `{{if index . "REDIS_METRICS_HOST_NETWORK_SERVER_PORT"}}{{.REDIS_METRICS_HOST_NETWORK_SERVER_PORT}}{{else}}{{.REDIS_METRICS_SERVER_PORT}}{{end}}` | toYaml }}
    - name: REDIS_CLUSTER_ALL_SHARDS_HOST_NETWORK_PORT
      valueFrom:
        hostNetworkVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          optional: true
          container:
            name: valkey-cluster
            port:
              name: valkey-cluster
              option: Required
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: ","
                keyValueDelimiter: ":"
  {{- end }}
    - name: REDIS_CLUSTER_ALL_SHARDS_HOST_NETWORK_BUS_PORT
      valueFrom:
        hostNetworkVarRef:
          compDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
          optional: true
          container:
            name: valkey-cluster
            port:
              name: cluster-bus
              option: Required
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: ","
                keyValueDelimiter: ":"
    - name: PHY_MEMORY
      valueFrom:
        resourceVarRef:
          memoryLimit: Required
  lifecycleActions:
    roleProbe:
      periodSeconds: 1
      timeoutSeconds: 1
      exec:
        container: valkey-cluster
        env:
        - name: CURRENT_POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: KB_HOST_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: KB_POD_FQDN
          value: "$(CURRENT_POD_NAME).$(CURRENT_SHARD_COMPONENT_NAME)-headless.$(CLUSTER_NAMESPACE).svc.{{ $.Values.clusterDomain }}"
        - name: KB_CLUSTER_COMP_NAME
          value: $(CURRENT_SHARD_COMPONENT_NAME)
        - name: REDIS_LB_ADVERTISED_HOST
          value: $(CURRENT_SHARD_LB_ADVERTISED_HOST)
        - name: KB_SERVICE_PORT
          value: "$(SERVICE_PORT)"
        command:
          - /tools/dbctl
          - redis
          - getrole
    postProvision:
      timeoutSeconds: 900
      exec:
        container: valkey-cluster
        command:
          - /bin/bash
          - -c
          - /scripts/valkey-cluster-manage.sh --post-provision  > /tmp/post-provision.log 2>&1
        env:
          - name: CURRENT_POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: CURRENT_POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          - name: CURRENT_POD_HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
      preCondition: RuntimeReady
      retryPolicy:
        maxRetries: 10
    memberLeave:
      exec:
        container: valkey-cluster
        command:
          - /bin/bash
          - -c
          - /scripts/valkey-cluster-replica-member-leave.sh > /tmp/member-leave.log 2>&1
      retryPolicy:
        maxRetries: 10
    switchover:
      # Switchover action timeout. Must cover the candidate replica's
      # full-sync + CLUSTER FAILOVER handshake; on timeout the operator
      # drops the primary anyway. Raise for large keyspaces.
      timeoutSeconds: 360
      exec:
        container: valkey-cluster
        command:
          - /bin/bash
          - -c
          - /scripts/valkey-cluster-switchover.sh  > /tmp/switchover.log 2>&1
    memberJoin:
      exec:
        container: valkey-cluster
        command:
          - /bin/bash
          - -c
          - /scripts/sync-acl.sh
        targetPodSelector: Any
  runtime:
    # Generous grace so AOF rewrite or in-flight fsync can land before SIGKILL.
    # Must exceed redis-conf `shutdown-timeout` (25s) by enough margin for
    # preStop hook + clean exit.
    terminationGracePeriodSeconds: 60
    initContainers:
      - name: init-dbctl
        command:
          - cp
          - -r
          - /bin/dbctl
          - /tools/
        imagePullPolicy: {{ default "IfNotPresent" $.Values.dbctlImage.pullPolicy }}
        volumeMounts:
          - mountPath: /tools
            name: tools
    containers:
      - name: valkey-cluster
        imagePullPolicy: {{ default "IfNotPresent" $.Values.image.pullPolicy }}
        ports:
          - name: valkey-cluster
            containerPort: 6379
          - name: cluster-bus
            containerPort: 16379
        volumeMounts:
          - name: data
            mountPath: {{ $.Values.dataMountPath }}
          - name: valkey-cluster-config
            mountPath: /etc/conf
          - name: scripts
            mountPath: /scripts
          - name: redis-conf
            mountPath: /etc/redis
          - mountPath: /tools
            name: tools
        env:
          - name: CURRENT_POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: CURRENT_POD_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.podIP
          - name: CURRENT_POD_HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
          - name: POD_FQDN
            value: "$(CURRENT_POD_NAME).$(CURRENT_SHARD_COMPONENT_NAME)-headless.$(CLUSTER_NAMESPACE).svc.{{ $.Values.clusterDomain }}"
        command: [ "/scripts/valkey-cluster-server-start.sh" ]
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
          exec:
            command:
              - sh
              - -c
              - /scripts/valkey-ping.sh
        lifecycle:
          preStop:
            exec:
              command:
                - /bin/bash
                - -c
                - /scripts/valkey-cluster-pre-stop.sh
  {{- if $.Values.enableMetrics }}
      - name: metrics
        imagePullPolicy: {{ $.Values.metrics.image.pullPolicy | quote }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
        env:
          - name: REDIS_ADDR
            value: "$(REDIS_METRICS_ADDR)"
          - name: REDIS_EXPORTER_WEB_LISTEN_ADDRESS
            value: "0.0.0.0:$(REDIS_METRICS_HTTP_PORT)"
          - name: REDIS_USER
            value: $(REDIS_DEFAULT_USER)
          - name: REDIS_PASSWORD
            value: $(REDIS_DEFAULT_PASSWORD)
          - name: REDIS_EXPORTER_IS_CLUSTER
            value: "true"
          - name: REDIS_EXPORTER_SKIP_TLS_VERIFICATION
            value: "true"
        ports:
          - name: http-metrics
            containerPort: {{ $.Values.metrics.service.port }}
          - name: server-metrics
            containerPort: {{ $.Values.metrics.service.serverPort }}
  {{- end }}
{{- end }}
