apiVersion: apps.kubeblocks.io/v1
kind: ShardingDefinition
metadata:
  name: valkey-cluster
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    {{- include "valkey.apiVersion" . | nindent 4 }}
spec:
  template:
    compDef: {{ include "valkeyCluster.cmpdRegexpPattern" . }}
  shardsLimit:
    minShards: 1
    maxShards: 64
  # updateStrategy: Serial requires our forked KubeBlocks operator
  # (feat/shard-update-strategy-serial), which rolls sharding components one at a
  # time, waiting for each shard to become ready before the next. Stock KB 1.0.2
  # validates this field but does not consume it (it updates all shards in
  # parallel), so against the stock operator this value is inert and harmless.
  # One-at-a-time keeps the rest of the cluster stable while a shard's primary
  # switchover runs, which a parallel rollout cannot guarantee.
  # provisionStrategy stays Parallel: new shards are created empty, no data risk.
  provisionStrategy: Parallel
  updateStrategy: Serial
  systemAccounts:
    - name: default
      shared: true
  lifecycleActions:
    shardRemove:
      timeoutSeconds: 900
      exec:
        container: valkey-cluster
        command:
          - /bin/bash
          - -c
          - /scripts/valkey-cluster-manage.sh --pre-terminate > /tmp/pre-terminate.log 2>&1
      retryPolicy:
        maxRetries: 10
